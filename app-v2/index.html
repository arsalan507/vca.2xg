<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VCA" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>VCA - Viral Content Analyzer</title>

    <!-- Script Vault: PWA manifest override (runs only on /pwascript) -->
    <script>
      if (location.pathname.startsWith('/pwascript')) {
        // Intercept manifest link as VitePWA injects it
        new MutationObserver(function(_, obs) {
          var m = document.querySelector('link[rel="manifest"]');
          if (m && m.getAttribute('href') !== '/sv-manifest.json') {
            m.setAttribute('href', '/sv-manifest.json');
            obs.disconnect();
          }
        }).observe(document.documentElement, { childList: true, subtree: true });
        // Override iOS PWA meta tags
        document.querySelector('meta[name="theme-color"]').content = '#0A0A0B';
        document.querySelector('meta[name="apple-mobile-web-app-title"]').content = 'Script Vault';
        document.title = 'Script Vault';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
